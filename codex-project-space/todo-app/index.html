<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Iterative Todo App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell" aria-live="polite">
    <header>
      <p class="eyebrow">Iteration-focused build</p>
      <h1>Dispatch &amp; Deliver Todos</h1>
      <p class="lede">Start small, iterate often: add, highlight, and finish work while the UI stays calm.</p>
    </header>

    <section class="controls">
      <form id="todo-form" class="todo-form" aria-label="Add a new todo">
        <label class="sr-only" for="todo-input">New todo</label>
        <input id="todo-input" name="todo" type="text" placeholder="What needs doing?" autocomplete="off" required />

        <label class="sr-only" for="priority-select">Priority</label>
        <select id="priority-select" name="priority">
          <option value="low">Low priority</option>
          <option value="medium" selected>Medium priority</option>
          <option value="high">High priority</option>
        </select>

        <button type="submit">Add todo</button>
      </form>

      <div class="filters" role="group" aria-label="Task filters">
        <button data-filter="all" class="active">All</button>
        <button data-filter="pending">Pending</button>
        <button data-filter="done">Done</button>
      </div>
    </section>

    <section class="summary">
      <div>
        <span class="summary-label">Total</span>
        <span id="total-count">0</span>
      </div>
      <div>
        <span class="summary-label">Done</span>
        <span id="done-count">0</span>
      </div>
      <div>
        <span class="summary-label">Pending</span>
        <span id="pending-count">0</span>
      </div>
    </section>

    <section class="list-panel">
      <ul id="todo-list" class="todo-list"></ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
